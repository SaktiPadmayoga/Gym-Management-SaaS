upstream php-fpm {
    server php:9000;
}

upstream nextjs {
    server nextjs:3000;
}

# ==========================================
# Central Domain — localhost (dev) + gymfit.id (prod)
# ==========================================
server {
    listen 80;
    server_name localhost gymfit.id www.gymfit.id *.gymfit.id ;
    
    root /var/www/html/public;
    index index.php;
    
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    client_max_body_size 50M;
    
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ==========================================
    # PRIORITAS 1: Next.js Static Assets
    # ==========================================
    location /_next/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant-Host $http_x_tenant_host;
        proxy_cache_bypass $http_upgrade;
    }

    # ==========================================
    # PRIORITAS 1.2: Next.js Public Static Files (/images/, /fonts/, etc)
    # ==========================================
    location /images/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant-Host $http_x_tenant_host;
        proxy_cache_bypass $http_upgrade;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ==========================================
    # PRIORITAS 1.5: Tenant Dynamic Storage Files (Local Dev Only)
    # ==========================================
    location ~ ^/storage/tenant_([a-f0-9\-]+)/(.*)$ {
        alias /var/www/html/storage/tenant$1/app/public/tenant_$1/$2;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ==========================================
    # PRIORITAS 2: Laravel Static Files
    # ==========================================
    location ~* ^/(css|js|build|storage)/.*\.(css|js|jpg|jpeg|png|gif|webp|ico|svg|woff|woff2|ttf|eot|pdf)$ {
        root /var/www/html/public;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ==========================================
    # PRIORITAS 3: API Routes - Laravel Backend
    # ==========================================
    location ~ ^/api(/.*)?$ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /sanctum/csrf-cookie {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/tenancy/assets(/.*)?$ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ==========================================
    # PRIORITAS 4: PHP Handler - FastCGI
    # ==========================================
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        
        # Override HTTP_HOST agar diteruskan menggunakan host subdomain asli dari client (sakti-gym.gymfit.id)
        # alih-alih fallback ke server_name pertama (gymfit.id)
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param SERVER_NAME $http_host;
        
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        fastcgi_param PHP_VALUE "upload_max_filesize=50M \n post_max_size=50M";
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ==========================================
    # PRIORITAS 5: Next.js Frontend (Catch-all)
    # ==========================================
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
        proxy_set_header X-Tenant-Host $http_x_tenant_host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    location /health {
        access_log off;
        return 200 "healthy (central)\n";
        add_header Content-Type text/plain;
    }
}

# ==========================================
# CDN Domain — cdn.gymfit.id
# Server block ini dibuat agar cdn.gymfit.id TIDAK tercampur
# dengan server block tenant wildcard (*.gymfit.id).
# Traffic cdn.gymfit.id seharusnya ditangani oleh Cloudflare R2 custom domain
# dan TIDAK pernah sampai ke VPS ini. Jika sampai ke sini, berarti
# DNS/Cloudflare custom domain R2 belum dikonfigurasi dengan benar.
# ==========================================
server {
    listen 80;
    server_name cdn.gymfit.id;

    # Jika request untuk file R2 (path ada slash dan tidak terlihat seperti halaman)
    # kembalikan 404 sederhana — jangan forward ke Next.js
    location / {
        return 404 "CDN domain not configured correctly. Please check Cloudflare R2 custom domain settings.\n";
        add_header Content-Type text/plain;
    }

    location /health {
        access_log off;
        return 200 "healthy (cdn-placeholder)\n";
        add_header Content-Type text/plain;
    }
}

# ==========================================
# Tenant Domains HTTP — *.localhost (dev) + *.gymfit.id (prod)
# ==========================================
server {
    listen 80;
    server_name ~^(?<tenant>[\w-]+)\.localhost$ ~^(?<tenant>[\w-]+)\.gymfit\.id$ ~^(?<tenant>[\w-]+)\.gymfit\.com$;
    
    root /var/www/html/public;
    index index.php;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ==========================================
    # PRIORITAS 1: Next.js Static Assets
    # ==========================================
    location /_next/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant $tenant;
        proxy_set_header X-Tenant-Host $http_x_tenant_host;
        proxy_cache_bypass $http_upgrade;
    }

    # ==========================================
    # PRIORITAS 1.2: Next.js Public Static Files (/images/, /fonts/, etc)
    # ==========================================
    location /images/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant-Host $http_x_tenant_host;
        proxy_cache_bypass $http_upgrade;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ==========================================
    # PRIORITAS 1.5: Tenant Dynamic Storage Files (Local Dev Only)
    # ==========================================
    location ~ ^/storage/tenant_([a-f0-9\-]+)/(.*)$ {
        alias /var/www/html/storage/tenant$1/app/public/tenant_$1/$2;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ==========================================
    # PRIORITAS 2: Laravel Static Files
    # ==========================================
    location ~* ^/(css|js|build|storage)/.*\.(css|js|jpg|jpeg|png|gif|webp|ico|svg|woff|woff2|ttf|eot|pdf)$ {
        root /var/www/html/public;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ==========================================
    # PRIORITAS 3: API Routes - Laravel Backend
    # ==========================================
    location ~ ^/api(/.*)?$ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /sanctum/csrf-cookie {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/tenancy/assets(/.*)?$ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ==========================================
    # PRIORITAS 4: PHP Handler dengan Tenant Header
    # ==========================================
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        
        # Override HTTP_HOST agar diteruskan menggunakan host subdomain asli dari client (sakti-gym.gymfit.id)
        # alih-alih fallback ke server_name pertama
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param SERVER_NAME $http_host;
        
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_X_TENANT $tenant;
        
        fastcgi_param PHP_VALUE "upload_max_filesize=50M \n post_max_size=50M";
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ==========================================
    # PRIORITAS 5: Next.js Frontend (Catch-all)
    # ==========================================
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
        proxy_set_header X-Tenant $tenant;
        proxy_set_header X-Tenant-Host $http_x_tenant_host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    location /health {
        access_log off;
        return 200 "healthy (tenant: $tenant)\n";
        add_header Content-Type text/plain;
    }
}
