# =============================================
# Docker Compose — Fitnice Production
# =============================================
# Arsitektur:
#   Internet:443 → Caddy (SSL) → Nginx:80 → PHP-FPM / Next.js
#
# Perbedaan dengan docker-compose.yml (dev):
#   - Caddy sebagai entry point publik (port 80/443)
#   - Nginx TIDAK expose port ke luar
#   - Next.js mode production (npm start)
#   - Postgres TIDAK expose port ke luar
#   - Semua secrets via environment variables
# =============================================

services:
    # ========================================
    # Caddy — SSL Termination & Reverse Proxy
    # ========================================
    caddy:
        build:
            context: ./docker/caddy
            dockerfile: Dockerfile
        container_name: gym-caddy
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
        environment:
            CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
        depends_on:
            - nginx
        networks:
            - gym-network
        restart: unless-stopped

    # ========================================
    # PostgreSQL - Primary Database
    # ========================================
    postgres:
        build:
            context: ./docker/postgres
            dockerfile: Dockerfile
        container_name: gym-postgres
        environment:
            POSTGRES_DB: gym_central
            POSTGRES_USER: ${DB_USERNAME:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
            POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - postgres_backups:/backups
        # Production: TIDAK expose port ke luar
        networks:
            - gym-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d gym_central"]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    # ========================================
    # PHP-FPM - Laravel Application
    # ========================================
    php:
        build:
            context: ./docker/php
            dockerfile: Dockerfile
        container_name: gym-php
        working_dir: /var/www/html
        environment:
            APP_NAME: "Fitnice"
            APP_ENV: production
            APP_DEBUG: "false"
            APP_KEY: ${APP_KEY}
            APP_URL: https://fitnice.com

            DB_CONNECTION: pgsql
            DB_HOST: postgres
            DB_PORT: 5432
            DB_DATABASE: gym_central
            DB_USERNAME: ${DB_USERNAME:-postgres}
            DB_PASSWORD: ${DB_PASSWORD:-secret}

            CACHE_STORE: database
            CACHE_DRIVER: database
            QUEUE_CONNECTION: sync
            SESSION_DRIVER: file
            SESSION_DOMAIN: .fitnice.com
            SESSION_SECURE_COOKIE: "true"

            SANCTUM_STATEFUL_DOMAINS: "fitnice.com,*.fitnice.com"

            TENANCY_DATABASE_MANAGER: postgres
            TENANCY_CACHE_DRIVER: database

            # Kosong di production karena HTTPS default port 443
            FRONTEND_PORT: ""

            # Mail (diisi via Komodo environment variables)
            MAIL_MAILER: ${MAIL_MAILER:-smtp}
            MAIL_HOST: ${MAIL_HOST:-}
            MAIL_PORT: ${MAIL_PORT:-587}
            MAIL_USERNAME: ${MAIL_USERNAME:-}
            MAIL_PASSWORD: ${MAIL_PASSWORD:-}
            MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
            MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@fitnice.com}
            MAIL_FROM_NAME: "Fitnice"

            # Google OAuth (opsional, diisi via Komodo)
            GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
            GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
            GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-}
            GOOGLE_MEMBER_REDIRECT_URL: ${GOOGLE_MEMBER_REDIRECT_URL:-}
        volumes:
            - ./src:/var/www/html
            - laravel_storage:/var/www/html/storage
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - gym-network
        restart: unless-stopped

    # ========================================
    # Next.js Frontend — Production Mode
    # ========================================
    nextjs:
        build:
            context: ./frontend
            dockerfile: ../docker/nextjs/Dockerfile
        container_name: gym-nextjs
        environment:
            NODE_ENV: production
            HOSTNAME: "0.0.0.0"
            PORT: "3000"
            NEXT_PUBLIC_API_URL: https://fitnice.com/api
            NEXT_PUBLIC_API_BASE_URL: https://fitnice.com/api
            NEXT_PUBLIC_ROOT_DOMAIN: fitnice.com
            NEXT_PUBLIC_APP_NAME: Fitnice
            NEXT_PUBLIC_TENANT_DOMAIN: fitnice.com
        networks:
            - gym-network
        restart: unless-stopped

    # ========================================
    # Nginx - Internal Web Server
    # ========================================
    nginx:
        build:
            context: ./docker/nginx
            dockerfile: Dockerfile
        container_name: gym-nginx
        # Production: TIDAK expose port ke luar — hanya Caddy yang publik
        volumes:
            - ./src:/var/www/html:ro
            - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
        depends_on:
            - php
            - nextjs
        networks:
            - gym-network
        restart: unless-stopped

# ========================================
# Networks
# ========================================
networks:
    gym-network:
        driver: bridge

# ========================================
# Volumes
# ========================================
volumes:
    postgres_data:
        driver: local
    postgres_backups:
        driver: local
    caddy_data:
        driver: local
    caddy_config:
        driver: local
    laravel_storage:
        driver: local
