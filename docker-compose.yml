services:
    # ========================================
    # PostgreSQL - Primary Database
    # ========================================
    postgres:
        build:
            context: ./docker/postgres
            dockerfile: Dockerfile
        container_name: gym-postgres
        environment:
            POSTGRES_DB: gym_central
            POSTGRES_USER: ${DB_USERNAME:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
            POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - postgres_backups:/backups
        ports:
            - "${DB_PORT:-5432}:5432"
        networks:
            - gym-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d gym_central"]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    # ========================================
    # PHP-FPM - Laravel Application
    # ========================================
    php:
        build:
            context: ./docker/php
            dockerfile: Dockerfile
        container_name: gym-php
        working_dir: /var/www/html
        environment:
            DB_CONNECTION: pgsql
            DB_HOST: postgres
            DB_PORT: 5432
            DB_DATABASE: gym_central
            DB_USERNAME: ${DB_USERNAME:-postgres}
            DB_PASSWORD: ${DB_PASSWORD:-secret}
            APP_ENV: ${APP_ENV:-local}
            APP_DEBUG: ${APP_DEBUG:-true}
            APP_KEY: ${APP_KEY:-}
            APP_URL: http://localhost
            CACHE_DRIVER: database
            QUEUE_CONNECTION: sync
            SESSION_DRIVER: file
        volumes:
            # Mount seluruh Laravel source code
            - ./src:/var/www/html
            # PENTING: Jangan gunakan named volume untuk storage/bootstrap
            # Biarkan di dalam ./src agar Nginx bisa akses
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - gym-network
        restart: unless-stopped

    # ========================================
    # Next.js Frontend
    # ========================================
    nextjs:
        build:
            context: ./frontend
            dockerfile: ../docker/nextjs/Dockerfile
        container_name: gym-nextjs
        working_dir: /app
        environment:
            NODE_ENV: development
            NEXT_PUBLIC_API_BASE_URL: http://localhost/api
            NEXT_PUBLIC_APP_NAME: Gym Management System
            NEXT_PUBLIC_TENANT_DOMAIN: localhost
        volumes:
            - ./frontend:/app
            - /app/node_modules
            - /app/.next
        networks:
            - gym-network
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s

    # ========================================
    # Nginx - Web Server
    # ========================================
    nginx:
        build:
            context: ./docker/nginx
            dockerfile: Dockerfile
        container_name: gym-nginx
        ports:
            - "80:80"
        volumes:
            # Mount Laravel public untuk akses static files
            - ./src:/var/www/html:ro
            # Mount nginx config
            - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
        depends_on:
            - php
            - nextjs
        networks:
            - gym-network
        restart: unless-stopped
        dns:
            - 8.8.8.8
            - 8.8.4.4

# ========================================
# Networks
# ========================================
networks:
    gym-network:
        driver: bridge

# ========================================
# Volumes
# ========================================
volumes:
    postgres_data:
        driver: local
    postgres_backups:
        driver: local
